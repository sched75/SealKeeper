# =============================================================================
# SealKeeper — Secret template (NEVER COMMIT REAL VALUES)
# =============================================================================
# This file is intentionally an EXAMPLE. Copy to secret.yaml and replace the
# placeholders, OR use External Secrets / Sealed Secrets to manage it out of
# band — that's the recommended path in production (FR-H.31).
#
# Generate the master secret with:
#     openssl rand -base64 32
#
# Stage `kubectl apply -f secret.yaml`-style applies through a private
# repository or vault integration — DO NOT push secret.yaml to git.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: sealkeeper
  namespace: sealkeeper
  labels:
    app.kubernetes.io/name: sealkeeper
type: Opaque
stringData:
  SK_MASTER_SECRET: "REPLACE_ME_WITH_BASE64_32_BYTES"
  SK_DATABASE_URL: "postgres://sealkeeper:REPLACE_ME@postgres.sealkeeper.svc.cluster.local:5432/sealkeeper?sslmode=require"
  # Optional — only set if /metrics should require a bearer token.
  SK_METRICS_TOKEN: ""
