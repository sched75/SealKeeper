# =============================================================================
# SealKeeper — ServiceAccount
# =============================================================================
# Lets us scope RBAC and network policies to the pods, even when none are
# strictly needed today. Avoid using `default` SA — it bites later.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sealkeeper
  namespace: sealkeeper
  labels:
    app.kubernetes.io/name: sealkeeper
    app.kubernetes.io/component: app
automountServiceAccountToken: false # SealKeeper never talks to the K8s API
