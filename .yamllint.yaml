# =============================================================================
# yamllint config (FR-L.42)
# =============================================================================
# Reference: https://yamllint.readthedocs.io/

extends: default

rules:
  line-length:
    max: 160
    level: warning
  document-start: disable
  truthy:
    allowed-values: ["true", "false", "on", "off"]
    check-keys: false
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  indentation:
    spaces: 2
    indent-sequences: consistent
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1

ignore: |
  web/node_modules/
  tests/e2e/node_modules/
  web/dist/
  bundle/
  helm/sealkeeper/charts/
