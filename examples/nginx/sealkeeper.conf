# =============================================================================
# Nginx reverse-proxy configuration for SealKeeper
# =============================================================================
# PRD: FR-H.45 — Nginx reverse-proxy reference. Drop this file under
# /etc/nginx/conf.d/sealkeeper.conf (or include it in your existing server
# block setup) and reload nginx.
#
# TLS certificate management is intentionally NOT included here — Nginx is
# usually deployed with an external certbot/acme.sh flow or a managed cert
# from your CDN. Adjust the paths in the `ssl_*` directives below.
# =============================================================================

# Upstream — SealKeeper listens on plain HTTP, TLS is terminated by Nginx.
upstream sealkeeper_upstream {
	zone sealkeeper 64k;
	server 127.0.0.1:8443 max_fails=3 fail_timeout=10s;
	keepalive 16;
}

# Redirect plain HTTP to HTTPS (also serves the ACME http-01 challenge).
server {
	listen      80;
	listen      [::]:80;
	server_name sealkeeper.example.com;

	location /.well-known/acme-challenge/ {
		root /var/www/acme;
	}

	location / {
		return 301 https://$host$request_uri;
	}
}

server {
	listen      443 ssl;
	listen      [::]:443 ssl;
	http2       on;
	server_name sealkeeper.example.com;

	# ---------------------------------------------------------------------
	# TLS — replace paths with your certificate management output.
	# ---------------------------------------------------------------------
	ssl_certificate     /etc/letsencrypt/live/sealkeeper.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/sealkeeper.example.com/privkey.pem;

	# Modern profile (Mozilla Intermediate). FR-H.76: TLS 1.2 minimum.
	ssl_protocols              TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers  off;
	ssl_session_cache          shared:SSL:10m;
	ssl_session_timeout        1h;
	ssl_session_tickets        off;
	ssl_stapling               on;
	ssl_stapling_verify        on;

	# ---------------------------------------------------------------------
	# Security headers
	# ---------------------------------------------------------------------
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
	add_header X-Content-Type-Options    "nosniff" always;
	add_header X-Frame-Options           "DENY" always;
	add_header Referrer-Policy           "no-referrer" always;
	add_header Permissions-Policy        "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

	# Hide nginx version (also: server_tokens off in nginx.conf)
	more_clear_headers Server;

	# ---------------------------------------------------------------------
	# Forwarding to SealKeeper
	# ---------------------------------------------------------------------
	# IMPORTANT: SealKeeper trusts X-Forwarded-* only when the source IP is
	# in SK_TRUSTED_PROXY_CIDRS (FR-H.42 / D-H.22). Ensure that variable
	# includes the host running this nginx, e.g. SK_TRUSTED_PROXY_CIDRS=127.0.0.1/32
	# when nginx and sealkeeper share a host.
	proxy_http_version 1.1;
	proxy_set_header   Host              $host;
	proxy_set_header   X-Real-IP         $remote_addr;
	proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
	proxy_set_header   X-Forwarded-Proto https;
	proxy_set_header   X-Forwarded-Host  $host;
	proxy_set_header   X-Forwarded-Port  $server_port;
	proxy_set_header   Connection        "";

	proxy_read_timeout 60s;
	proxy_send_timeout 60s;
	proxy_buffering    off;

	# Static asset cache — the JS bundle URL is fingerprinted by the build.
	location ~* ^/static/ {
		proxy_pass http://sealkeeper_upstream;
		expires    1y;
		add_header Cache-Control "public, max-age=31536000, immutable" always;
	}

	location / {
		proxy_pass http://sealkeeper_upstream;
	}

	# Compression — only safe MIME types
	gzip               on;
	gzip_vary          on;
	gzip_proxied       any;
	gzip_min_length    1024;
	gzip_types         text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml application/wasm;

	# Access log JSON. Define the format once in nginx.conf as:
	#   log_format json_combined escape=json '{ "time":"$time_iso8601", "remote_addr":"$remote_addr", ... }';
	access_log /var/log/nginx/sealkeeper-access.log json_combined;
	error_log  /var/log/nginx/sealkeeper-error.log warn;
}
