# =============================================================================
# Hadolint config — pairs with Dockerfile and the lint job in ci.yml
# =============================================================================
# Reference: https://github.com/hadolint/hadolint

failure-threshold: warning

# We pin via SHA in release.yml; the base image moves only via Renovate PRs.
ignored:
  - DL3007 # using latest tag — distroless:nonroot is a moving alias by design
  - DL3008 # explicit apk version pinning — alpine builder is intentionally floating in builder

trustedRegistries:
  - docker.io
  - gcr.io
  - ghcr.io

format: tty
