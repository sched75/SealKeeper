# =============================================================================
# SealKeeper — Security re-scan
# =============================================================================
# Trigger: weekly cron Monday 06:00 UTC + manual dispatch
# Purpose: catch advisories that landed AFTER a release was cut.
#
# PRD: FR-L.31 (govulncheck), FR-L.35 (Trivy on image), FR-L.55 (deps hygiene)
# =============================================================================

name: Security

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"
  IMAGE_REF: ghcr.io/${{ github.repository_owner }}/sealkeeper:latest
  TRIVY_VERSION: "0.58.0"

jobs:
  deps-rescan:
    name: Dependencies re-scan (govulncheck + npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      go_findings: ${{ steps.gov.outputs.findings }}
      npm_findings: ${{ steps.npm.outputs.findings }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "${{ env.GO_VERSION }}", cache: true }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: govulncheck (JSON output)
        id: gov
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          set +e
          govulncheck -json ./... > govulncheck.json
          rc=$?
          set -e
          # rc != 0 means at least one affecting vuln; we keep the report and
          # surface a flag for the issue-creation step.
          if [ "$rc" -ne 0 ]; then
            echo "findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: npm audit (web)
        id: npm
        if: hashFiles('web/package-lock.json') != ''
        run: |
          set +e
          (cd web && npm audit --audit-level=high --json) > npm-audit-web.json
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then echo "findings=true" >> "$GITHUB_OUTPUT"; else echo "findings=false" >> "$GITHUB_OUTPUT"; fi

      - name: Upload dep-scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dep-scan-reports
          path: |
            govulncheck.json
            npm-audit-web.json
          retention-days: 30

  image-rescan:
    name: Trivy re-scan latest image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      findings: ${{ steps.trivy.outputs.findings }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image ref
        id: ref
        run: echo "ref=$(echo '${{ env.IMAGE_REF }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Install Trivy
        run: |
          set -euo pipefail
          curl -sSL -o trivy.deb https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.deb
          sudo dpkg -i trivy.deb

      - name: Pull latest image (best-effort)
        run: docker pull "${{ steps.ref.outputs.ref }}" || echo "::warning::cannot pull ${{ steps.ref.outputs.ref }} — first release pending?"

      - name: Trivy scan (HIGH/CRITICAL)
        id: trivy
        run: |
          set -euo pipefail
          set +e
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --no-progress \
            --format sarif \
            --output trivy.sarif \
            "${{ steps.ref.outputs.ref }}"
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then echo "findings=true" >> "$GITHUB_OUTPUT"; else echo "findings=false" >> "$GITHUB_OUTPUT"; fi

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-weekly

  open-issue:
    name: Open issue on findings
    runs-on: ubuntu-latest
    needs: [deps-rescan, image-rescan]
    if: |
      needs.deps-rescan.outputs.go_findings == 'true' ||
      needs.deps-rescan.outputs.npm_findings == 'true' ||
      needs.image-rescan.outputs.findings == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dep-scan-reports, path: reports }

      - name: Create or update tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = `Security: weekly scan ${new Date().toISOString().slice(0,10)} found HIGH/CRITICAL vulns`;
            let body = `Weekly scan triggered by \`security.yml\` reported issues. Details:\n\n`;
            for (const f of ['reports/govulncheck.json', 'reports/npm-audit-web.json']) {
              if (fs.existsSync(f)) {
                body += `\n### ${f}\n\`\`\`\n` + fs.readFileSync(f, 'utf8').slice(0, 4000) + `\n\`\`\`\n`;
              }
            }
            body += `\nSARIF for the image scan has been uploaded to the Security tab.\n`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'automated']
            });
