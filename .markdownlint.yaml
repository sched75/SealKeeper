# =============================================================================
# markdownlint config (FR-L.43)
# =============================================================================
# Reference: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# MD013 (line-length): Markdown source line length doesn't affect rendered
# output and the project's prose docs (README, SECURITY, QUICKSTART) keep
# paragraphs on single lines on purpose for friendlier diffs.
MD013: false

# MD031 (blanks around fences) / MD032 (blanks around lists): style-only
# noise on the existing docs. Re-enable once docs are normalised in a
# dedicated cleanup pass.
MD031: false
MD032: false

# MD040 (fenced-code-language): plain-text shell transcripts often omit
# the language tag on purpose to render in a neutral style.
MD040: false

MD024: # multiple headings with same content
  siblings_only: true

MD033: false # inline HTML — sometimes necessary for callouts/badges
MD041: false # first line h1 — many docs have YAML frontmatter first

MD046:
  style: fenced

MD048:
  style: backtick
