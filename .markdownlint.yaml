# =============================================================================
# markdownlint config (FR-L.43)
# =============================================================================
# Reference: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

MD013: # line length — relaxed for technical content
  line_length: 160
  code_blocks: false
  tables: false

MD024: # multiple headings with same content
  siblings_only: true

MD033: false # inline HTML — sometimes necessary for callouts/badges
MD041: false # first line h1 — many docs have YAML frontmatter first

MD046:
  style: fenced

MD048:
  style: backtick
