# Default values for SealKeeper.
# Override on the CLI: `helm install sealkeeper ./sealkeeper -f my-values.yaml`
# PRD: module H §6.1.

image:
  repository: ghcr.io/sealkeeper/sealkeeper
  tag: ""               # falls back to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent
  pullSecrets: []       # [{ name: regcred }]

# Replica count. Recommended ≥ 2 for HA (FR-H.36).
replicaCount: 2

# Names — keep empty to use the chart-generated defaults.
nameOverride: ""
fullnameOverride: ""

# Application configuration → ConfigMap (non-secret) and Secret.
config:
  # SK_MODE: "production" or "eval" (FR-H.13)
  mode: production
  # SK_BASE_URL — public URL used for cookie domain + absolute links.
  baseUrl: https://sealkeeper.example.com
  httpListen: ":8443"
  logFormat: json
  logLevel: info
  # FR-H.42 / D-H.22 — narrow to the ingress controller's pod CIDR in prod.
  trustedProxyCIDRs: "10.0.0.0/8"
  maxLibrarySizeMB: 10
  maxActiveSessions: 10000
  sessionTTLSeconds: 900
  adminSessionTTLSeconds: 28800
  adminSessionIdleSeconds: 1800
  swaggerUiEnabled: false
  demoMode: false
  maintenanceMode: false

# Secrets — see secret.yaml. In production prefer ExternalSecrets / Sealed
# Secrets and set `secret.create: false` + `secret.existingSecret: <name>`.
secret:
  create: true
  existingSecret: ""
  # 32-byte base64 master secret. MUST be set in production.
  masterSecret: ""
  # Full DSN. Either supply a value here OR use a pre-existing secret managed
  # out of band.
  databaseUrl: ""
  # Optional bearer token for /metrics. Empty disables auth.
  metricsToken: ""

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false
  annotations: {}

# Pod-level security context (FR-H.33, 68-71).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8443
  annotations: {}

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: sealkeeper.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sealkeeper-tls
      hosts:
        - sealkeeper.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "12m"
  # Cert-manager — set issuer to enable.
  certManager:
    enabled: false
    clusterIssuer: letsencrypt-prod

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Probes (FR-H.35).
probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    initialDelaySeconds: 2
    periodSeconds: 2
    failureThreshold: 30

persistence:
  enabled: false
  storageClass: ""
  accessModes: [ReadWriteOnce]
  size: 1Gi
  annotations: {}

# Rolling update strategy — pair with PDB minAvailable: 1 below for zero
# downtime upgrades (FR-H.64).
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# NetworkPolicy — disabled by default to keep the chart applicable on
# clusters without a network plugin that enforces them.
networkPolicy:
  enabled: false
  ingressNamespaceLabel: ingress-nginx
  # Egress CIDRs are conservative-ish; narrow in prod.
  smtp:
    enabled: false
    cidrs: []
    ports: [587]
  siem:
    enabled: false
    cidrs: []
    ports:
      - { protocol: TCP, number: 514 }

# Prometheus ServiceMonitor — created only when prometheus-operator is
# installed and `serviceMonitor.enabled: true`.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  bearerTokenSecret: ""   # set when /metrics requires SK_METRICS_TOKEN

# Topology spread / affinity / tolerations / nodeSelector
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: sealkeeper

nodeSelector: {}
tolerations: []
affinity: {}

# Extra environment variables and volumes — escape hatches for unforeseen needs.
extraEnv: []
extraVolumes: []
extraVolumeMounts: []
