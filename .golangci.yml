# =============================================================================
# SealKeeper — golangci-lint configuration (v2 schema)
# =============================================================================
# PRD reference: FR-L.39 — required linters: errcheck, govet, staticcheck,
# gosec, gocritic, revive, unused, gosimple, ineffassign, misspell.
#
# v2 changes vs v1: top-level `version: "2"`, `linters-settings:` moves under
# `linters.settings:`, `gosimple` is merged into `staticcheck` (drop it),
# `exportloopref` deprecated in favour of `copyloopvar` since Go 1.22.
# =============================================================================

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true
  allow-parallel-runners: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    # FR-L.39 mandated set. `gosimple` was folded into `staticcheck` in v2.
    - errcheck
    - govet
    - staticcheck
    - gosec
    - gocritic
    - revive
    - unused
    - ineffassign
    - misspell
    # Curated bug-catchers — keep signal high without false positives.
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - nilerr
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - whitespace
    - contextcheck
    - nakedret
    - noctx
    - prealloc

  exclusions:
    paths:
      - vendor
      - web/node_modules
      - tests/e2e/node_modules
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - revive
          - unparam

  settings:
    govet:
      enable-all: true
      disable:
        # fieldalignment is noisy on real-world structs and a debatable
        # micro-optimisation; revisit on hot paths case by case.
        - fieldalignment
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104 # already covered by errcheck
      config:
        G306: "0640"
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - ifElseChain
        - hugeParam
    revive:
      rules:
        - name: exported
          severity: warning
        - name: package-comments
          severity: warning
        - name: var-naming
          severity: warning
        - name: indent-error-flow
        - name: errorf
        - name: time-naming
        - name: context-as-argument
        - name: context-keys-type
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
    misspell:
      locale: US
      ignore-rules:
        - SealKeeper
    errorlint:
      errorf: true
      asserts: true
      comparison: true
