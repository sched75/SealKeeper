# =============================================================================
# SealKeeper — golangci-lint v2 configuration
# =============================================================================
# PRD reference: FR-L.39 — required linters: errcheck, govet, staticcheck,
# gosec, gocritic, revive, unused, gosimple (merged into staticcheck in v2),
# ineffassign, misspell.
# =============================================================================

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true
  allow-parallel-runners: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    # FR-L.39 mandated set.
    - errcheck
    - govet
    - staticcheck
    - gosec
    - gocritic
    - revive
    - unused
    - ineffassign
    - misspell
    # Curated bug-catchers — kept narrow on purpose; the broader set in v1
    # was noisy without finding real bugs.
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - nilerr
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - whitespace

  exclusions:
    paths:
      - vendor
      - web/node_modules
      - tests/e2e/node_modules
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - revive
          - gocritic

  settings:
    govet:
      enable-all: true
      disable:
        # `fieldalignment` is noisy and a debatable micro-optimisation.
        - fieldalignment
        # `shadow` flags every idiomatic `if err := …; err != nil` inside
        # a parent function that already has `err` in scope. We accept that
        # pattern across the codebase; renaming inner vars adds clutter.
        - shadow
    errcheck:
      # Closer.Close on deferred lines is the canonical pattern in Go; we
      # don't want to wrap each one in `_ = …`. Real misses come from non-
      # deferred Close calls, which errcheck still catches.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*net/smtp.Client).Close
        - (*net.Conn).Close
        - (io.ReadCloser).Close
        - (*bufio.Writer).Flush
        - fmt.Fprintf
        - fmt.Fprintln
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104 # already covered by errcheck
        - G115 # integer overflow: intentional in TOTP / counter packing
        - G301 # directory perms 0755: standard for /data and libraries dirs
        - G304 # file inclusion via variable: admin-controlled config paths
        - G306 # file permission 0640 is intentionally less restrictive than 0600
        - G402 # InsecureSkipVerify: explicit admin opt-in on SMTP TLS config
        - G501 # blocklisted import md5: not used; kept for safety
        - G505 # blocklisted import sha1: required by RFC 6238 (TOTP) and OTP libraries
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - ifElseChain
        - hugeParam
        - unnamedResult        # purely stylistic
        - paramTypeCombine     # stylistic; sometimes hurts clarity
        - commentedOutCode     # false positives on doc-comments containing code
        - unnecessaryDefer     # false positive on small functions
        - sprintfQuotedString  # %q vs "\"%s\"" — both acceptable
    revive:
      rules:
        # Keep the rules that catch real mistakes; drop the comment-heavy
        # `exported` and `package-comments` rules — too noisy for a young
        # codebase where everything still moves.
        - name: indent-error-flow
        - name: errorf
        - name: time-naming
        - name: context-as-argument
        - name: context-keys-type
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
          disabled: true
    misspell:
      # Don't enforce a locale — the codebase mixes British and American
      # spellings on purpose ("realised" + "centralized"). misspell still
      # catches genuine typos that aren't valid in either dialect.
      ignore-rules:
        - SealKeeper
    errorlint:
      errorf: true
      asserts: true
      comparison: true
