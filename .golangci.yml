# =============================================================================
# SealKeeper — golangci-lint configuration
# =============================================================================
# PRD reference: FR-L.39 — required linters listed below.
# DECISION: this targets golangci-lint v1.62+ (config schema v1).
# =============================================================================

run:
  timeout: 5m
  go: "1.22"
  modules-download-mode: readonly
  tests: true
  allow-parallel-runners: true

issues:
  exclude-dirs:
    - vendor
    - web/node_modules
    - tests/e2e/node_modules
  exclude-files:
    - "_mock\\.go$"
    - ".*\\.pb\\.go$"
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - revive
    - text: "weak cryptographic primitive"
      linters: [gosec]
      path: internal/crypto/legacy_.*\.go
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  disable-all: true
  # FR-L.39: errcheck, govet, staticcheck, gosec, gocritic, revive, unused,
  # gosimple, ineffassign, misspell.
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - gocritic
    - revive
    - unused
    - gosimple
    - ineffassign
    - misspell
    # Sane defaults that catch real bugs without false-positive storms.
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - exportloopref
    - durationcheck
    - errorlint
    - nilerr
    - prealloc
    - unconvert
    - unparam
    - whitespace
    - tparallel
    - asasalint
    - asciicheck
    - bidichk
    - contextcheck
    - copyloopvar
    - decorder
    - dogsled
    - dupword
    - exhaustive
    - forbidigo
    - gocheckcompilerdirectives
    - gomoddirectives
    - importas
    - makezero
    - mirror
    - nakedret
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - reassign
    - tagliatelle
    - testifylint
    - thelper
    - usestdlibvars

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment # noisy on real-world structs; revisit case by case
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104 # errcheck already covers unchecked errors
    config:
      G306: "0640"
  gocritic:
    enabled-tags: [diagnostic, performance, style]
    disabled-checks:
      - ifElseChain
      - hugeParam
  revive:
    rules:
      - name: exported
        severity: warning
      - name: package-comments
        severity: warning
      - name: var-naming
        severity: warning
      - name: indent-error-flow
      - name: errorf
      - name: time-naming
      - name: context-as-argument
      - name: context-keys-type
      - name: empty-block
      - name: superfluous-else
      - name: unreachable-code
      - name: unused-parameter
        severity: warning
      - name: redefines-builtin-id
  misspell:
    locale: US
    ignore-words:
      - SealKeeper
  errorlint:
    errorf: true
    asserts: true
    comparison: true
  forbidigo:
    # forbidigo v1.6+ (shipped with golangci-lint v1.55+) renamed the rule
    # struct's `pattern` field to `p`. The old name is now rejected by the
    # config schema; keep the explanatory `msg`.
    forbid:
      - p: '^fmt\.Print(ln|f)?$'
        msg: "use slog or the configured logger instead of fmt.Print*"
      - p: '^panic\($'
        msg: "panic is reserved for unrecoverable startup errors; use errors otherwise"
    exclude-godoc-examples: true
  tagliatelle:
    case:
      rules:
        json: snake
        yaml: snake
        env: upperSnake
  testifylint:
    enable-all: true
  nolintlint:
    require-explanation: true
    require-specific: true
