# =============================================================================
# SealKeeper — pre-commit hooks
# =============================================================================
# Install once locally:  pip install pre-commit && pre-commit install
# Run on all files:      pre-commit run --all-files
#
# PRD: FR-L.38..45 (gofmt, goimports, prettier, eslint, markdownlint, hadolint,
#      shellcheck, yamllint), D-L.24 (pre-commit config livré, CONTRIBUTING
#      explique l'installation).
# =============================================================================

default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

repos:
  # -------------------------------------------------------------------------
  # Generic hygiene
  # -------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key

  # -------------------------------------------------------------------------
  # Go
  # -------------------------------------------------------------------------
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports
      - id: go-mod-tidy
      - id: go-vet

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.62.0
    hooks:
      - id: golangci-lint
        args: [--config=.golangci.yml]

  # -------------------------------------------------------------------------
  # JavaScript / TypeScript / Markdown / YAML / JSON / CSS via Prettier
  # -------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, ts, css, scss, html, json, yaml, markdown]
        exclude: |
          (?x)^(
            web/dist/.*|
            .*\.min\.(js|css)|
            tests/e2e/playwright-report/.*
          )$

  # -------------------------------------------------------------------------
  # ESLint (web/)
  # -------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.18.0
    hooks:
      - id: eslint
        files: ^web/.*\.(js|jsx|ts|tsx|mjs)$
        additional_dependencies:
          - eslint@9.18.0
          - eslint-config-prettier@9.1.0

  # -------------------------------------------------------------------------
  # Markdown
  # -------------------------------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--config=.markdownlint.yaml]
        exclude: ^(CHANGELOG\.md|.*node_modules/.*)$

  # -------------------------------------------------------------------------
  # YAML
  # -------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

  # -------------------------------------------------------------------------
  # Dockerfile
  # -------------------------------------------------------------------------
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint
        args: [--config=.hadolint.yaml]

  # -------------------------------------------------------------------------
  # Shell scripts
  # -------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # -------------------------------------------------------------------------
  # Commit message: Conventional Commits (FR-L.61) + DCO sign-off
  # -------------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --strict
          - feat
          - fix
          - docs
          - chore
          - ci
          - refactor
          - perf
          - test
          - build
          - style
          - revert

  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.30.0
    hooks:
      - id: check-github-workflows
